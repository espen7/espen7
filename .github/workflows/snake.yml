name: Generate Snake

on:
  # 每6个小时自动运行一次，保持动画更新
  schedule:
    - cron: "0 */6 * * *"
  # 允许你在 Actions 页面手动触发运行
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出你的代码仓库
      - name: Checkout
        uses: actions/checkout@v3

      # 2. 生成贪吃蛇动画（自动读取你的用户名 espen7 的贡献图）
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: espen7
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 3. 将生成的动画推送到 output 分支
      - name: Push to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
